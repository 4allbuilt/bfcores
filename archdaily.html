<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArchDaily Research Monitor — Build-For-All</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=Noto+Sans+KR:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0e;
    --surface: #141414;
    --border: #1e1e1e;
    --text: #d4cfc8;
    --dim: #555;
    --muted: #333;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    letter-spacing: 0.06em;
    color: #f0ede8;
    text-transform: uppercase;
  }

  .logo span { color: var(--dim); font-size: 14px; }

  .logo-sub {
    font-size: 10px;
    color: var(--dim);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.08em;
    margin-top: 3px;
  }

  .badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--dim);
    border: 1px solid var(--muted);
    padding: 4px 10px;
    letter-spacing: 0.1em;
  }

  main {
    max-width: 920px;
    margin: 0 auto;
    padding: 28px 20px;
  }

  /* ── 컨트롤 패널 ── */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 22px;
    margin-bottom: 20px;
  }

  .panel-row {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 18px;
  }

  .panel-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .day-btns { display: flex; gap: 6px; }

  .day-btn {
    background: transparent;
    border: 1px solid var(--muted);
    color: var(--dim);
    padding: 5px 16px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    transition: all 0.15s;
  }

  .day-btn.active {
    background: var(--surface);
    border-color: #888;
    color: var(--text);
  }

  .divider { border-top: 1px solid var(--border); margin: 18px 0; }

  .kw-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    margin-bottom: 12px;
  }

  .kw-btn {
    border: 1px solid var(--muted);
    background: transparent;
    padding: 10px 14px;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
    font-family: 'Noto Sans KR', sans-serif;
  }

  .kw-btn .k-kr { font-size: 10px; display: block; opacity: 0.6; margin-bottom: 2px; }
  .kw-btn .k-en { font-size: 12px; font-weight: 600; }

  .custom-row { display: flex; gap: 8px; margin-bottom: 10px; }

  .custom-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--muted);
    color: var(--text);
    padding: 8px 12px;
    font-size: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
  }

  .add-btn {
    background: var(--surface);
    border: 1px solid var(--muted);
    color: var(--dim);
    padding: 8px 14px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
  }

  .custom-tags { display: flex; flex-wrap: wrap; gap: 6px; }

  .custom-tag {
    background: var(--surface);
    border: 1px solid var(--muted);
    color: #aaa;
    padding: 3px 10px;
    font-size: 11px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'DM Mono', monospace;
  }

  .tag-x { cursor: pointer; color: var(--dim); font-size: 10px; }

  .run-btn {
    width: 100%;
    background: #f0ede8;
    color: #0e0e0e;
    border: none;
    padding: 14px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    letter-spacing: 0.05em;
    transition: opacity 0.2s;
    margin-top: 18px;
  }

  .run-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .err-box {
    margin-top: 12px;
    background: #1a0a0a;
    border: 1px solid #3a1a1a;
    color: #c87070;
    padding: 10px 14px;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
  }

  /* ── 결과 영역 ── */
  .results {
    background: var(--surface);
    border: 1px solid var(--border);
    margin-bottom: 20px;
  }

  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    padding: 0 18px;
    align-items: center;
  }

  .tab {
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--dim);
    padding: 12px 16px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.05em;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .tab.active { color: var(--text); border-bottom-color: var(--text); }

  .count {
    background: var(--muted);
    color: #888;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 10px;
  }

  .dl-tab-btn {
    margin-left: auto;
    background: transparent;
    border: 1px solid var(--muted);
    color: var(--dim);
    padding: 5px 12px;
    font-size: 11px;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.05em;
  }

  .article-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1px;
    background: #1a1a1a;
  }

  .card { background: var(--surface); overflow: hidden; }

  .card-img {
    width: 100%; height: 160px;
    object-fit: cover;
    filter: brightness(0.82);
    display: block;
  }

  .card-body { padding: 14px 16px; }

  .card-date {
    font-size: 10px;
    color: var(--dim);
    font-family: 'DM Mono', monospace;
    margin-bottom: 6px;
    letter-spacing: 0.05em;
  }

  .card-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.4;
    margin-bottom: 8px;
    font-family: 'DM Serif Display', serif;
  }

  .card-desc {
    font-size: 11px;
    color: var(--dim);
    line-height: 1.6;
    margin-bottom: 10px;
  }

  .card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }

  .card-tag {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 20px;
    font-family: 'DM Mono', monospace;
  }

  .card-link {
    font-size: 11px;
    color: #888;
    text-decoration: none;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.05em;
  }

  .summary-wrap { padding: 24px; max-height: 560px; overflow-y: auto; }

  .summary-text { line-height: 1.8; }

  .summary-text h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    color: #f0ede8;
    margin: 20px 0 8px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 6px;
  }

  .summary-text h2 {
    font-size: 14px;
    font-weight: 700;
    color: #d4c9b8;
    margin: 16px 0 6px;
  }

  .summary-text h3 {
    font-size: 13px;
    font-weight: 600;
    color: #b8a898;
    margin: 12px 0 4px;
  }

  .summary-text p { margin: 4px 0; color: #b0a89a; font-size: 13px; }
  .summary-text ul { padding-left: 16px; }
  .summary-text li { color: #a8a09a; font-size: 13px; margin: 3px 0; }
  .summary-text strong { color: #d8d0c4; }
  .summary-text hr { border: none; border-top: 1px solid var(--muted); margin: 12px 0; }

  .empty { padding: 48px; text-align: center; color: var(--dim); font-size: 13px; }

  .status-bar {
    text-align: center;
    padding: 60px 20px;
    color: var(--dim);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.05em;
  }

  .status-icon { font-size: 36px; margin-bottom: 12px; opacity: 0.4; }

  @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }
  .loading-text { animation: pulse 1.5s infinite; }

  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-thumb { background: var(--muted); }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">ARCHDAILY <span>/ Research Monitor</span></div>
    <div class="logo-sub">건축 접근성·포용적 디자인 주간 동향 수집 에이전트</div>
  </div>
  <span class="badge">RSS · AI SUMMARY</span>
</header>

<main>
  <!-- 컨트롤 패널 -->
  <div class="panel">
    <div class="panel-row">
      <span class="panel-label" style="margin-bottom:0">수집 기간</span>
      <div class="day-btns">
        <button class="day-btn" onclick="setDay(3,this)">3일</button>
        <button class="day-btn active" onclick="setDay(7,this)">7일</button>
        <button class="day-btn" onclick="setDay(14,this)">14일</button>
        <button class="day-btn" onclick="setDay(30,this)">30일</button>
      </div>
    </div>

    <div class="divider"></div>

    <div class="panel-label">연구 키워드</div>
    <div class="kw-grid" id="kw-grid"></div>

    <div class="custom-row">
      <input class="custom-input" id="custom-kw" placeholder="직접 입력 (예: adaptive reuse)" onkeydown="if(event.key==='Enter')addCustom()">
      <button class="add-btn" onclick="addCustom()">추가</button>
    </div>
    <div class="custom-tags" id="custom-tags"></div>

    <button class="run-btn" id="run-btn" onclick="run()">▶  수집 · 분석 시작</button>
    <div class="err-box" id="err-box" style="display:none"></div>
  </div>

  <!-- 결과 -->
  <div class="results" id="results" style="display:none">
    <div class="tabs">
      <button class="tab active" id="tab-articles" onclick="switchTab('articles')">
        기사 목록 <span class="count" id="article-count">0</span>
      </button>
      <button class="tab" id="tab-summary" onclick="switchTab('summary')">
        AI 연구 요약
      </button>
      <button class="dl-tab-btn" onclick="downloadSummary()">⬇ .md 저장</button>
    </div>

    <div id="articles-pane">
      <div class="article-grid" id="article-grid"></div>
    </div>

    <div id="summary-pane" style="display:none">
      <div class="summary-wrap">
        <div class="summary-text" id="summary-content"></div>
      </div>
    </div>
  </div>

  <div class="status-bar" id="status-bar" style="display:none">
    <div class="status-icon">◎</div>
    <div class="loading-text" id="status-text">수집 중...</div>
  </div>
</main>

<script>
// ── 상태 ──────────────────────────────────────────────────────────────────────
const KEYWORDS = [
  { id: 'inclusive', label: 'Inclusive Design', kr: '포용적 디자인', color: '#4A90D9', active: true },
  { id: 'school', label: 'School Architecture', kr: '학교 건축', color: '#50A882', active: true },
  { id: 'barrier', label: 'Barrier-Free', kr: 'BF 인증', color: '#C4501A', active: true },
  { id: 'neuro', label: 'Neurodiversity', kr: '신경다양성', color: '#8B5CF6', active: true },
];

const KW_TERMS = {
  inclusive: ['inclusive','inclusion','universal design','accessible','accessibility'],
  school: ['school','education','classroom','kindergarten','learning','campus'],
  barrier: ['barrier-free','barrier free','wheelchair','disabled','mobility','ramp','tactile'],
  neuro: ['neurodiversity','autism','sensory','adhd','special needs','cognitive'],
};

let dayRange = 7;
let customKws = [];
let allArticles = [];
let filtered = [];
let summaryMd = '';
let isRunning = false;
let activeTab = 'articles';

// ── 키워드 렌더링 ─────────────────────────────────────────────────────────────
function renderKeywords() {
  const grid = document.getElementById('kw-grid');
  grid.innerHTML = '';
  KEYWORDS.forEach(kw => {
    const btn = document.createElement('button');
    btn.className = 'kw-btn';
    btn.style.borderColor = kw.active ? kw.color : '#333';
    btn.style.background = kw.active ? kw.color + '18' : 'transparent';
    btn.style.color = kw.active ? kw.color : '#666';
    btn.innerHTML = `<span class="k-kr">${kw.kr}</span><span class="k-en">${kw.label}</span>`;
    btn.onclick = () => { kw.active = !kw.active; renderKeywords(); };
    grid.appendChild(btn);
  });
}

function setDay(d, el) {
  dayRange = d;
  document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

function addCustom() {
  const kw = document.getElementById('custom-kw').value.trim();
  if (!kw || customKws.includes(kw)) return;
  customKws.push(kw);
  document.getElementById('custom-kw').value = '';
  renderCustomTags();
}

function removeCustom(kw) {
  customKws = customKws.filter(k => k !== kw);
  renderCustomTags();
}

function renderCustomTags() {
  const el = document.getElementById('custom-tags');
  el.innerHTML = customKws.map(kw =>
    `<span class="custom-tag">${kw}<span class="tag-x" onclick="removeCustom('${kw}')">✕</span></span>`
  ).join('');
}

// ── RSS ───────────────────────────────────────────────────────────────────────
async function fetchRSS() {
  const url = 'https://feeds.feedburner.com/Archdaily';
  const proxies = [
    `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
    `https://corsproxy.io/?${encodeURIComponent(url)}`,
  ];
  for (const proxy of proxies) {
    try {
      const res = await fetch(proxy, { signal: AbortSignal.timeout(10000) });
      if (!res.ok) continue;
      const data = await res.json();
      const xmlStr = data.contents ?? '';
      const xml = new DOMParser().parseFromString(xmlStr, 'text/xml');
      return Array.from(xml.querySelectorAll('item')).map(item => ({
        title: item.querySelector('title')?.textContent ?? '',
        link: item.querySelector('link')?.textContent ?? '',
        desc: (item.querySelector('description')?.textContent ?? '').replace(/<[^>]+>/g,' ').trim().slice(0,400),
        pubDate: new Date(item.querySelector('pubDate')?.textContent ?? ''),
        imgUrl: item.querySelector('enclosure')?.getAttribute('url') ?? extractImg(item.querySelector('description')?.textContent ?? ''),
      }));
    } catch {}
  }
  return null;
}

function extractImg(html) {
  const m = html.match(/src="([^"]+\.(jpg|jpeg|png|webp))"/i);
  return m ? m[1] : null;
}

function withinDays(date, days) {
  const c = new Date(); c.setDate(c.getDate() - days); return date >= c;
}

function matchesKeywords(item) {
  const text = (item.title + ' ' + item.desc).toLowerCase();
  const activeIds = KEYWORDS.filter(k => k.active).map(k => k.id);
  const allTerms = [...activeIds.flatMap(id => KW_TERMS[id] ?? []), ...customKws.map(k => k.toLowerCase())];
  return allTerms.some(t => text.includes(t));
}

// ── AI 요약 ───────────────────────────────────────────────────────────────────
async function summarize(articles) {
  const list = articles.slice(0, 12).map((a, i) =>
    `[${i+1}] ${a.title}\n${a.desc}\nURL: ${a.link}`
  ).join('\n\n');

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      stream: true,
      messages: [{ role: 'user', content: `당신은 건축 접근성·포용적 디자인 분야 박사 연구자를 위한 문헌 분석 보조입니다.

아래 ArchDaily 기사 목록을 분석하여 연구 관점의 요약 보고서를 작성하세요.

# ArchDaily 주간 연구 동향 보고서
수집일: ${new Date().toLocaleDateString('ko-KR')}

## 1. 핵심 동향 요약
## 2. 기사별 연구 관련성 분석
각 기사: 제목 / 연구 연관 키워드 / 핵심 내용(2~3문장) / 활용 가능성 / URL
## 3. 후속 조사 권고 항목
## 4. 연구 공백 및 시사점

원칙: 주관적 평가 배제. 건조한 보고체. 검증된 내용만.

기사 목록:
${list}` }],
    }),
  });

  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  const el = document.getElementById('summary-content');
  summaryMd = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    for (const line of decoder.decode(value).split('\n')) {
      if (!line.startsWith('data: ')) continue;
      try {
        const d = JSON.parse(line.slice(6));
        if (d.type === 'content_block_delta' && d.delta?.text) {
          summaryMd += d.delta.text;
          el.innerHTML = parseMd(summaryMd);
        }
      } catch {}
    }
  }
}

// ── 마크다운 파서 ─────────────────────────────────────────────────────────────
function parseMd(text) {
  return text
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/^---$/gm, '<hr>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/^(?!<[hliup])(.+)$/gm, '<p>$1</p>');
}

// ── 실행 ──────────────────────────────────────────────────────────────────────
async function run() {
  if (isRunning) return;
  isRunning = true;
  document.getElementById('run-btn').disabled = true;
  document.getElementById('err-box').style.display = 'none';
  document.getElementById('results').style.display = 'none';
  document.getElementById('status-bar').style.display = 'block';
  document.getElementById('status-text').textContent = 'RSS 피드 수집 중...';

  const items = await fetchRSS();
  if (!items) {
    document.getElementById('err-box').style.display = 'block';
    document.getElementById('err-box').textContent = 'RSS 피드를 가져오지 못했습니다. 잠시 후 재시도하세요.';
    document.getElementById('status-bar').style.display = 'none';
    isRunning = false;
    document.getElementById('run-btn').disabled = false;
    document.getElementById('run-btn').textContent = '▶  수집 · 분석 시작';
    return;
  }

  document.getElementById('status-text').textContent = '키워드 필터링 중...';
  allArticles = items;
  const recent = items.filter(a => withinDays(a.pubDate, dayRange));
  filtered = recent.filter(a => matchesKeywords(a));

  document.getElementById('article-count').textContent = filtered.length;
  renderArticles();

  if (filtered.length > 0) {
    document.getElementById('status-text').textContent = 'AI 분석 중...';
    document.getElementById('status-bar').style.display = 'none';
    document.getElementById('results').style.display = 'block';
    document.getElementById('summary-content').innerHTML = '<p style="color:var(--dim);font-family:DM Mono,monospace;font-size:12px;animation:pulse 1.5s infinite">분석 중...</p>';
    try { await summarize(filtered); } catch (e) { console.error(e); }
  } else {
    document.getElementById('status-bar').style.display = 'none';
    document.getElementById('results').style.display = 'block';
  }

  isRunning = false;
  document.getElementById('run-btn').disabled = false;
  document.getElementById('run-btn').textContent = '▶  수집 · 분석 시작';
}

// ── 기사 렌더링 ───────────────────────────────────────────────────────────────
function renderArticles() {
  const grid = document.getElementById('article-grid');
  if (!filtered.length) {
    grid.innerHTML = '<div class="empty">해당 기간·키워드에 일치하는 기사가 없습니다.<br>기간을 늘리거나 키워드를 조정하세요.</div>';
    return;
  }
  grid.innerHTML = '';
  filtered.forEach(a => {
    const tags = KEYWORDS.filter(k => k.active && KW_TERMS[k.id]?.some(t => (a.title+a.desc).toLowerCase().includes(t)));
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      ${a.imgUrl ? `<img class="card-img" src="${a.imgUrl}" alt="" onerror="this.style.display='none'">` : ''}
      <div class="card-body">
        <div class="card-date">${a.pubDate.toLocaleDateString('ko-KR',{month:'short',day:'numeric'})}</div>
        <div class="card-title">${a.title}</div>
        <div class="card-desc">${a.desc.slice(0,140)}...</div>
        <div class="card-tags">${tags.map(k=>`<span class="card-tag" style="background:${k.color}20;color:${k.color}">${k.label}</span>`).join('')}</div>
        <a class="card-link" href="${a.link}" target="_blank" rel="noopener">기사 보기 →</a>
      </div>`;
    grid.appendChild(card);
  });
}

// ── 탭 전환 ───────────────────────────────────────────────────────────────────
function switchTab(tab) {
  activeTab = tab;
  document.getElementById('articles-pane').style.display = tab === 'articles' ? 'block' : 'none';
  document.getElementById('summary-pane').style.display = tab === 'summary' ? 'block' : 'none';
  document.getElementById('tab-articles').className = 'tab' + (tab === 'articles' ? ' active' : '');
  document.getElementById('tab-summary').className = 'tab' + (tab === 'summary' ? ' active' : '');
}

// ── 다운로드 ─────────────────────────────────────────────────────────────────
function downloadSummary() {
  if (!summaryMd) return alert('아직 요약 내용이 없습니다.');
  const date = new Date().toISOString().slice(0, 10);
  const blob = new Blob([summaryMd], { type: 'text/markdown;charset=utf-8' });
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(blob),
    download: `archdaily_research_${date}.md`,
  });
  a.click();
  URL.revokeObjectURL(a.href);
}

// ── 초기화 ───────────────────────────────────────────────────────────────────
renderKeywords();
</script>
</body>
